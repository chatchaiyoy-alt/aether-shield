<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS App | Sovereignty Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #f4f1ea; --ink: #1c2e4a; --gold: #b8860b; }
        body { margin: 0; background: var(--paper); font-family: 'Prompt', sans-serif; color: var(--ink); padding: 20px; }
        .app-card { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 1.2rem; border-bottom: 2px solid var(--gold); padding-bottom: 10px; text-transform: uppercase; }
        .control-group { margin: 25px 0; }
        label { display: block; margin-bottom: 10px; font-size: 0.9rem; }
        input[type="range"] { width: 100%; accent-color: var(--gold); cursor: pointer; }
        .result-box { text-align: center; background: var(--ink); color: white; padding: 20px; margin-top: 30px; border-radius: 4px; }
        .score { font-size: 3rem; font-weight: 600; color: var(--gold); }
        .btn-back { display: inline-block; margin-top: 20px; color: var(--gold); text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="app-card">
    <h1>📊 ประเมินความเป็นอธิปไตยดิจิทัล</h1>
    
    <div class="control-group">
        <label>1. TRACE (ความโปร่งใสของร่องรอย): <span id="v1">50</span>%</label>
        <input type="range" min="0" max="100" value="50" oninput="calculate('v1', this.value)">
    </div>
    <div class="control-group">
        <label>2. ACCESS (อิสรภาพในการเข้าถึง): <span id="v2">50</span>%</label>
        <input type="range" min="0" max="100" value="50" oninput="calculate('v2', this.value)">
    </div>
    <div class="control-group">
        <label>3. GRACE (ความบริสุทธิ์ของระบบ): <span id="v3">50</span>%</label>
        <input type="range" min="0" max="100" value="50" oninput="calculate('v3', this.value)">
    </div>
    <div class="result-box">
        <div class="score" id="total">50.00</div>
        <div>Sovereignty Score (v1.0)</div>
    </div>
    <a href="index.html" class="btn-back">← กลับหน้าหลัก</a>
</div>
<script>
    let vals = { v1: 50, v2: 50, v3: 50 };
    function calculate(id, value) {
        vals[id] = parseInt(value);
        document.getElementById(id).innerText = value;
        let avg = (vals.v1 + vals.v2 + vals.v3) / 3;
        document.getElementById('total').innerText = avg.toFixed(2);
    }
</script>
</body>
</html>
